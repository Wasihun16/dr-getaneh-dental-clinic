<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>የአድሚን ዳሽቦርድ | Dr. Getaneh Clinic</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f4f7f6; 
            padding: 20px; 
            margin: 0;
        }
        h2 { 
            color: #2c3e50; 
            text-align: center; 
            margin-bottom: 20px;
            font-weight: 600;
        }
        .table-container {
            max-width: 1200px;
            margin: 0 auto;
            background: white; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            border-radius: 8px;
            overflow: hidden;
        }
        table { 
            width: 100%; 
            border-collapse: collapse; 
        }
        th, td { 
            padding: 14px 12px; 
            text-align: left; 
            border-bottom: 1px solid #eeeeee; 
            font-size: 14px;
        }
        th { 
            background-color: #3498db; 
            color: white; 
            font-weight: 600;
            text-transform: uppercase;
            font-size: 13px;
        }
        tr:hover { 
            background-color: #f9fbfd; 
        }
        .delete-btn {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.2s;
        }
        .delete-btn:hover {
            background-color: #c0392b;
        }
        .ticket-badge {
            background-color: #2ecc71;
            color: white;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <h2>🏥 Dr. Getaneh Clinic - የታካሚዎች እና ቀጠሮዎች ዳሽቦርድ</h2>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>መታወቂያ (Ticket)</th>
                    <th>ሙሉ ስም</th>
                    <th>ስልክ ቁጥር</th>
                    <th>የቀጠሮ ቀን</th>
                    <th>የቀጠሮ ሰዓት</th>
                    <th>የመምጫ ምክንያት</th>
                    <th>የተመዘገበበት ቀን</th>
                    <th>እርምጃ</th>
                </tr>
            </thead>
            <tbody id="patientsTableBody">
                <tr><td colspan="8" style="text-align:center; color:#7f8c8d;">መረጃው በመጫን ላይ ነው...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        // ታካሚዎችን ከኤፒአይ (API) አምጥቶ የሚያሳየው ዋና ፈንክሽን
        function loadPatients() {
            fetch('/api/patients')
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Network response was not ok');
                    }
                    return response.json();
                })
                .then(data => {
                    const tableBody = document.getElementById('patientsTableBody');
                    tableBody.innerHTML = ''; 
                    
                    if (data.length === 0) {
                        tableBody.innerHTML = `<tr><td colspan="8" style="text-align:center; color:#7f8c8d;">እስካሁን የተመዘገበ ታካሚ የለም።</td></tr>`;
                        return;
                    }

                    data.forEach(patient => {
                        const row = `<tr id="patient-row-${patient.id}">
                            <td><span class="ticket-badge">${patient.ticket_id || 'የለውም'}</span></td>
                            <td><strong>${patient.full_name}</strong></td>
                            <td>${patient.phone_number || 'የለውም'}</td>
                            <td>${patient.appointment_date || 'አልተመረጠም'}</td>
                            <td>${patient.appointment_time || 'አልተመረጠም'}</td>
                            <td><span title="${patient.reason}">${patient.reason ? (patient.reason.substring(0, 30) + '...') : 'ልዩ ምክንያት አልተጠቀሰም'}</span></td>
                            <td>${new Date(patient.created_at).toLocaleString('am-ET')}</td>
                            <td>
                                <button class="delete-btn" onclick="deletePatient(${patient.id}, '${patient.full_name}')">ሰርዝ</button>
                            </td>
                        </tr>`;
                        tableBody.innerHTML += row;
                    });
                })
                .catch(error => {
                    console.error('Error fetching patients:', error);
                    document.getElementById('patientsTableBody').innerHTML = 
                        `<tr><td colspan="8" style="text-align:center; color:red;">መረጃውን መጫን አልተቻለም። እባክዎ ሰርቨሩ መብራቱን ያረጋግጡ።</td></tr>`;
                });
        }

        // ታካሚን በቀጥታ ከዳታቤዝ የሚያጠፋው ፈንክሽን (Delete Function)
        function deletePatient(id, name) {
            if (confirm(`እርግጠኛ ነዎት የታካሚ ${name} መረጃ ሙሉ በሙሉ እንዲሰረዝ ይፈልጋሉ?`)) {
                fetch(`/api/patients/${id}`, {
                    method: 'DELETE'
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        alert('የታካሚው መረጃ በተሳካ ሁኔታ ተሰርዟል!');
                        // ገጹን ሪፍሬሽ ሳናደርግ ሰንጠረዡ ላይ መስመሩን ብቻ ማጥፋት
                        const row = document.getElementById(`patient-row-${id}`);
                        if (row) row.remove();
                    } else {
                        alert('ስህተት፦ ' + data.message);
                    }
                })
                .catch(error => {
                    console.error('Error deleting patient:', error);
                    alert('የመሰረዝ ሂደቱ አልተሳካም። እባክዎ እንደገና ይሞክሩ።');
                });
            }
        }

        // ገጹ ሲከፈት መረጃውን ወዲያውኑ እንዲጭን ማድረግ
        window.onload = loadPatients;
    </script>

</body>
</html>
